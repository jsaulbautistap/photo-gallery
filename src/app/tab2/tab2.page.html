<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Tómate una foto (～￣▽￣)～
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding" fullscreen>
  <!-- Botón centrado vertical y horizontal -->
  <div class="boton-centrado">
    <ion-button expand="block"  (click)="fotoBajaCalidad()">
      Foto con baja calidad
    </ion-button>
  </div>
  <ion-fab vertical="bottom" horizontal="center" slot="fixed">
    <ion-fab-button (click)="guardarFotoGaleria()">
      <ion-icon name="camera"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
